# Example: Image segmentation with user-provided format
# Dataset structure: image files paired with mask files using matching basenames

data_type: image
task_type: segmentation
input_spec:
  shape: [3, 512, 512]          # channels, height, width
  dtype: float32
  channels_first: true
output_spec:
  type: mask
  mask_shape: [512, 512]
  num_classes: 4                # background + 3 foreground classes
splits:
  train: data/images/train
  val: data/images/val
  test: data/images/test
preprocessing:
  - name: resize
    params: { size: [512, 512] }
  - name: random_horizontal_flip
    params: { p: 0.5 }
  - name: normalize
    params: { mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225] }
data_format_option: user_provided
user_format_spec:
  format_type: ImageMaskPairs
  details:
    image_dir: data/images
    mask_dir: data/masks
    image_extensions: [".jpg", ".png"]
    mask_extension: ".png"
    pairing_rule: "Match image and mask by identical basename under the same split."
    mask_encoding: "Single-channel integer mask where pixel value is class index."
metadata:
  source: "Road scene segmentation example"
  description: "Semantic segmentation dataset with paired RGB images and PNG masks."
  note: "Masks are categorical label maps, not RGB color masks."
