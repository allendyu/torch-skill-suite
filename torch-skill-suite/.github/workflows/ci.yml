name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1  # for audio data tests

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install PyYAML jsonschema pytest
          pip install fastapi uvicorn pillow  # for serve tests
          pip install onnxruntime  # for ONNX export tests

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 .claude/skills/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 .claude/skills/ --count --max-complexity=15 --max-line-length=127 --statistics

      - name: Test torch-data
        run: python -m pytest .claude/skills/torch-data/tests/ -v --tb=short -q
        working-directory: torch-skill-suite

      - name: Test torch-model
        run: python -m pytest .claude/skills/torch-model/tests/ -v --tb=short -q
        working-directory: torch-skill-suite

      - name: Test torch-train
        run: python -m pytest .claude/skills/torch-train/tests/ -v --tb=short -q
        working-directory: torch-skill-suite

      - name: Test torch-eval-tune
        run: python -m pytest .claude/skills/torch-eval-tune/tests/ -v --tb=short -q
        working-directory: torch-skill-suite

      - name: Test torch-infer-deploy
        run: python -m pytest .claude/skills/torch-infer-deploy/tests/ -v --tb=short -q
        working-directory: torch-skill-suite
