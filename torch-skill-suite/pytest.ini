[pytest]
testpaths =
    .claude/skills/torch-data/tests
    .claude/skills/torch-model/tests
    .claude/skills/torch-train/tests
    .claude/skills/torch-eval-tune/tests
    .claude/skills/torch-infer-deploy/tests
norecursedirs =
    .git
    __pycache__
    *.egg-info
    .claude/skills/*/scripts
    .claude/skills/*/templates
python_files =
    test_*.py
addopts =
    -ra
    --strict-markers
