# Canonical data contract example for the suite MVP path.
# This file is a single schema-valid contract, not a multi-example catalog.

data_type: image
task_type: classification
input_spec:
  shape:
  - 3
  - 224
  - 224
  dtype: float32
  channels_first: true
output_spec:
  type: categorical
  num_classes: 3
  label_map:
    0: cat
    1: dog
    2: bird
splits:
  train: data/train
  val: data/val
  test: data/test
preprocessing:
- name: resize
  params:
    size:
    - 224
    - 224
- name: normalize
  params:
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
data_format_option: user_provided
user_format_spec:
  format_type: ImageFolder
  details:
    structure: class folders inside split folders
    extensions:
    - .jpg
    - .png
metadata:
  source: Imagenet subset
  license: CC-BY
