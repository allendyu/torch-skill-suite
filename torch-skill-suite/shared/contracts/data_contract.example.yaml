# Example data contract showcasing multiple data types and task types.
# This example demonstrates both user_provided and auto_inferred format options.

# --- Example 1: Image Classification (user_provided format) ---
image_classification:
  data_type: image
  task_type: classification
  input_spec:
    shape: [3, 224, 224]          # channels, height, width
    dtype: float32
    channels_first: true
  output_spec:
    type: categorical
    num_classes: 10
    label_map:
      0: cat
      1: dog
      2: bird
  splits:
    train: data/train
    val: data/val
    test: data/test
  preprocessing:
    - name: resize
      params: { size: [224, 224] }
    - name: normalize
      params: { mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225] }
  data_format_option: user_provided
  user_format_spec:
    format_type: ImageFolder
    details:
      structure: "class folders inside split folders"
      extensions: [".jpg", ".png"]
  metadata:
    source: "Imagenet subset"
    license: "CC-BY"

# --- Example 2: Text Classification (auto_inferred format) ---
text_classification:
  data_type: text
  task_type: classification
  input_spec:
    sequence_length: 512
    vocab_size: 30522
    dtype: int64
  output_spec:
    type: categorical
    num_classes: 5
    label_map:
      0: negative
      1: somewhat_negative
      2: neutral
      3: somewhat_positive
      4: positive
  splits:
    train: data/train.csv
    val: data/val.csv
    test: data/test.csv
  preprocessing:
    - name: tokenize
      params: { tokenizer: "bert-base-uncased", max_length: 512 }
  data_format_option: auto_inferred
  inferred_format_spec:
    format_type: CSV
    details:
      columns: ["text", "label"]
      delimiter: ","
      encoding: "utf-8"
  metadata:
    source: "Sentiment analysis dataset"

# --- Example 3: Time Series Regression (user_provided format) ---
time_series_regression:
  data_type: time_series
  task_type: regression
  input_spec:
    shape: [100, 5]                # time_steps, features
    dtype: float32
  output_spec:
    type: continuous
    output_dim: 1
  splits:
    train: 0.7
    val: 0.15
    test: 0.15
  preprocessing:
    - name: standardize
      params: { per_feature: true }
  data_format_option: user_provided
  user_format_spec:
    format_type: NPZ
    details:
      keys: ["X", "y"]
      shape: "(n_samples, 100, 5)"
  metadata:
    description: "Multivariate time series predicting continuous value"

# --- Example 4: Object Detection (auto_inferred format) ---
object_detection:
  data_type: image
  task_type: detection
  input_spec:
    shape: [3, 640, 640]
    dtype: uint8
    channels_first: true
  output_spec:
    type: bounding_box
    bbox_format: "xywh"
  splits:
    train: data/images/train
    val: data/images/val
  preprocessing:
    - name: resize
      params: { size: [640, 640], keep_aspect_ratio: true }
    - name: normalize
      params: { scale: 1/255.0 }
  data_format_option: auto_inferred
  inferred_format_spec:
    format_type: YOLO
    details:
      label_dir: "data/labels"
      class_file: "data/classes.txt"
  metadata:
    annotation_format: "YOLO darknet"

# --- Example 5: Tabular Classification (user_provided format) ---
tabular_classification:
  data_type: tabular
  task_type: classification
  input_spec:
    num_features: 30
    dtype: float32
  output_spec:
    type: categorical
    num_classes: 2
    label_map:
      0: benign
      1: malignant
  splits:
    train: data/train.csv
    val: data/val.csv
    test: data/test.csv
  preprocessing:
    - name: impute
      params: { strategy: "median" }
    - name: scale
      params: { method: "standard" }
  data_format_option: user_provided
  user_format_spec:
    format_type: CSV
    details:
      header: true
      target_column: "target"
  metadata:
    source: "Medical dataset"