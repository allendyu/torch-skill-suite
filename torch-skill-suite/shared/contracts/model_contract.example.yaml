# Example model contracts for image classification (P0 route).
# Each example corresponds to a different backbone selection scenario.
# All examples should pass validation against model_contract.schema.json.

# --- Example 1: ResNet34 (balanced default) ---
image_classification_resnet34:
  task_type: classification
  data_type: image

  input_spec:
    shape: [3, 224, 224]
    dtype: float32
    channels_first: true

  model_spec:
    family: cnn
    architecture: resnet
    backbone: resnet34
    pretrained: true
    in_channels: 3
    feature_dim: 512

  head_spec:
    type: linear_cls
    num_classes: 3
    pooling: avg
    dropout: 0.0

  forward_spec:
    input_tensor_name: images
    output_tensor_name: logits
    output_shape: [batch, 3]

  compatibility:
    expected_target_type: categorical
    expected_loss: cross_entropy
    target_dtype: int64
    output_activation: none

  constraints:
    latency_tier: balanced
    model_size_mb: 85

  artifacts:
    template_name: image_classification/resnet
    smoke_test_required: true

  metadata:
    route: image_classification
    priority: P0
    description: "ResNet34 for balanced latency/accuracy tradeoff"

