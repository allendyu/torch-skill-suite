# Scenario data contract example: image_segmentation.

data_type: image
task_type: segmentation
input_spec:
  shape:
  - 3
  - 512
  - 512
  dtype: float32
  channels_first: true
output_spec:
  type: mask
  mask_shape:
  - 512
  - 512
  num_classes: 4
splits:
  train: data/images/train
  val: data/images/val
  test: data/images/test
preprocessing:
- name: resize
  params:
    size:
    - 512
    - 512
- name: normalize
  params:
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
data_format_option: user_provided
user_format_spec:
  format_type: ImageMaskPairs
  details:
    image_dir: data/images
    mask_dir: data/masks
    pairing_rule: Match image and mask by identical basename under the same split.
metadata:
  source: Road scene segmentation example
