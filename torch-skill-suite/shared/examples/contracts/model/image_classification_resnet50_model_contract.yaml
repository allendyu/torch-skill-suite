# Scenario model contract example: image_classification_resnet50.

task_type: classification
data_type: image
input_spec:
  shape:
  - 3
  - 224
  - 224
  dtype: float32
  channels_first: true
model_spec:
  family: cnn
  architecture: resnet
  backbone: resnet50
  pretrained: true
  in_channels: 3
  feature_dim: 2048
head_spec:
  type: linear_cls
  num_classes: 100
  pooling: avg
  dropout: 0.0
forward_spec:
  input_tensor_name: images
  output_tensor_name: logits
  output_shape:
  - batch
  - 100
compatibility:
  expected_target_type: categorical
  expected_loss: cross_entropy
  target_dtype: int64
  output_activation: none
constraints:
  latency_tier: accurate
  model_size_mb: 98
artifacts:
  template_name: image_classification/resnet
  smoke_test_required: true
metadata:
  route: image_classification
  priority: P0
  description: ResNet50 for accuracy-priority scenarios
